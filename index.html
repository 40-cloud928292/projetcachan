<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Cachan - GEII Vélizy | Pololu 3Pi+</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2e114d;       /* Violet très sombre */
            --secondary: #5b21b6;     /* Violet profond royal */
            --accent: #a78bfa;        /* Violet clair pour les accents */
            --dark: #120626;          /* Presque noir à nuance violette */
            --light: #f6f4fa;         /* Fond clair teinté de violet */
            --text: #231930;          /* Texte principal sombre */
            --text-light: #6d5f7a;    /* Texte secondaire adouci */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--light);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ===== NAVIGATION ===== */
        nav {
            background: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(46,17,77,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            user-select: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary);
            transition: width 0.3s;
        }

        .nav-links a:hover {
            color: var(--secondary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--secondary);
        }

        .nav-links a.active::after {
            width: 100%;
        }

        /* ===== PAGES ===== */
        .page {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== HERO SECTION ===== */
        .hero {
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 50%, var(--secondary) 100%);
            color: white;
            padding: 8rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1), transparent);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(30px) translateX(20px); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .hero .subtitle {
            font-size: 1.4rem;
            opacity: 0.95;
            margin-bottom: 0.5rem;
        }

        .hero .tagline {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 2.5rem;
            font-style: italic;
        }

        .cta-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 2.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--secondary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(91, 33, 182, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: transparent;
            color: white;
        }

        /* ===== CONTENT SECTIONS ===== */
        .section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-title {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary);
            font-weight: 700;
        }

        .section-subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 3rem;
        }

        .title-line {
            display: inline-block;
            width: 60px;
            height: 4px;
            background: var(--secondary);
            border-radius: 2px;
            margin-bottom: 2rem;
        }

        /* ===== ÉQUIPE ===== */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .team-card {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
            border: 2px solid #eee8f5;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .team-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(46,17,77,0.12);
            border-color: var(--secondary);
        }

        .team-card:hover::before {
            transform: scaleX(1);
        }

        .avatar {
            width: 110px;
            height: 110px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(46, 17, 77, 0.2);
        }

        .team-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .team-role {
            color: var(--secondary);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
        }

        .team-desc {
            color: var(--text-light);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        /* ===== ROBOT ===== */
        .robot-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            margin-top: 3rem;
        }

        .robot-visual {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            border: 2px dashed var(--accent);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .specs-list {
            display: grid;
            gap: 1.5rem;
        }

        .spec-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }

        .spec-card:hover {
            border-left-color: var(--secondary);
            transform: translateX(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .spec-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .spec-text {
            color: var(--text-light);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        /* ===== ÉPREUVES ===== */
        .epreuves-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .epreuve {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            border: 2px solid #eee8f5;
            transition: all 0.3s;
            position: relative;
        }

        .epreuve-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--primary);
        }

        .epreuve-text {
            color: var(--text-light);
            margin-bottom: 1rem;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .epreuve-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .epreuve:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: var(--secondary);
        }

        /* ===== PROGRAMMATION ===== */
        .code-cards {
            display: grid;
            gap: 2rem;
            margin-top: 3rem;
        }

        .code-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            border: 2px solid #eee8f5;
            transition: all 0.3s;
        }

        .code-card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
